<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Print wala ho</title>
</head>
<style>
    @media screen {
        body {
            background-color: yellow;
            color: black;
        }
    }

    @media print {
        body {
            background-color: white;
            color: black;
            font-size: 14pt;
        }
    }
</style>

<body>
    <h1>Responsive Test</h1>
    <p>This page has no viewport.</p>
</body>

</html>
