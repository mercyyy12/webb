<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flex-start {
            display: flex;
            justify-content: flex-start;
        }

        .flex-end {
            display: flex;
            justify-content: flex-end;

        }

        .flex-center {
            display: flex;
            justify-content: center;
        }

        .flex-space-between {
            display: flex;
            justify-content: space-between;
        }

        .flex-space-around {
            display: flex;
            justify-content: space-around;
        }

        .item {
            background-color: red;
            height: 100PX;
            width: 100PX;
        }

        .item1 {
            background-color: blue;
            height: 100PX;
            width: 100PX;
        }

        .item2 {
            background-color: yellow;
            height: 100PX;
            width: 100PX;
        }

        .item3 {
            background-color: rgb(235, 109, 31);
            height: 100PX;
            width: 100PX;
        }

        .item4 {
            background-color: rgb(195, 21, 243);
            height: 100PX;
            width: 100PX;
        }

        .container {
            padding: 10px;

        }
    </style>
</head>

<body>
    <div class="container">
        <div class="flex-start">
            <div class="item">item 1</div>
            <div class="item">item 2</div>
            <div class="item">item 3</div>
        </div>
        <br>

        <div class="flex-center">
            <div class="item1">item A</div>
            <div class="item1">item B</div>
            <div class="item1">item C</div>
        </div>
        <br>

        <div class="flex-end">
            <div class="item2">ram</div>
            <div class="item2">shyam</div>
            <div class="item2">john</div>
        </div>

        <div class="flex-space-between">
            <div class="item3">Box X</div>
            <div class="item3">Box Y</div>
            <div class="item3">Box Z</div>
        </div>


        <div class="flex-space-around">
            <div class="item4">section 1</div>
            <div class="item4">section2</div>
            <div class="item4"> section 3</div>
        </div>
    </div>

</body>

</html>
