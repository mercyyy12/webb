<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>audio-video</title>
</head>

<body>
    <div class="audio">
        <audio controls autoplay loop preload="auto">
            <source src="audio.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="video">
        <video src="video.mp4" width="500" height="500" controls autoplay loop poster="thumbnail.jpg">
            <source src="video.mp4" type="video/mp4">
    </div>
    <a href="https://https://global.redmagic.gg" target="_blank"> <img src="photo/image.webp" /></a>

    <div class="iframe">
        <iframe width="560" height="315" src="https://www.youtube.com/embed/2-QCqbMsPDc?si=yalRkSnRfgQGCu65"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        <!-- <iframe src="" frameborder="0"></iframe> -->
    </div>
</body>

</html>
